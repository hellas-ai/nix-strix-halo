name: PR checks

on:
  pull_request:
    branches:
      - master

permissions:
  contents: read

concurrency:
  group: pr-checks-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  nix-matrix:
    runs-on: [self-hosted, shared]
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4
      - id: set-matrix
        name: Generate Nix check matrix
        run: |
          set -Eeu
          matrix="$(
            nix eval --accept-flake-config --json '.#checks' --apply '
              checks:
              let
                systems = builtins.attrNames checks;
              in
              {
                include = builtins.concatLists (
                  map
                    (system:
                      map
                        (check:
                          {
                            inherit system check;
                            name = check;
                            attr = "checks.${system}.${check}";
                          })
                        (builtins.attrNames checks.${system}))
                    systems
                );
              }
            '
          )"
          echo "matrix=$matrix" >> "$GITHUB_OUTPUT"

  flake-check:
    runs-on: [self-hosted, shared]
    steps:
      - uses: actions/checkout@v4
      - name: Evaluate flake
        run: nix flake check --accept-flake-config --no-build

  nix-check:
    runs-on: [self-hosted, shared]
    name: ${{ matrix.name }} (${{ matrix.system }})
    needs: nix-matrix
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.nix-matrix.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v4
      - name: Build check
        run: nix build --accept-flake-config -L '.#${{ matrix.attr }}'

  required-checks:
    runs-on: [self-hosted, shared]
    if: always()
    name: required checks
    needs:
      - nix-matrix
      - flake-check
      - nix-check
    steps:
      - name: Require all PR checks
        run: |
          set -Eeu
          test '${{ needs.nix-matrix.result }}' = 'success'
          test '${{ needs.flake-check.result }}' = 'success'
          test '${{ needs.nix-check.result }}' = 'success'
