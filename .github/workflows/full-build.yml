name: Full build

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: full-build-${{ github.ref }}
  cancel-in-progress: false

jobs:
  nix-matrix:
    runs-on: [self-hosted, shared]
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4
      - id: set-matrix
        name: Generate package build matrix
        run: |
          set -Eeu
          matrix="$(
            nix eval --accept-flake-config --json '.#packages' --apply '
              packages:
              let
                hasPrefix = prefix: value:
                  builtins.substring 0 (builtins.stringLength prefix) value == prefix;
                systems = builtins.filter (system: system == "x86_64-linux") (builtins.attrNames packages);
                packageNames = system:
                  builtins.filter
                    (name: name != "default" && !(hasPrefix "bench-" name))
                    (builtins.attrNames packages.${system});
              in
              {
                include = builtins.concatLists (
                  map
                    (system:
                      map
                        (package:
                          {
                            inherit system package;
                            attr = "packages.${system}.${package}";
                          })
                        (packageNames system))
                    systems
                );
              }
            '
          )"
          echo "matrix=$matrix" >> "$GITHUB_OUTPUT"

  build:
    runs-on: [self-hosted, shared]
    name: ${{ matrix.package }} (${{ matrix.system }})
    needs: nix-matrix
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.nix-matrix.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v4
      - name: Build package
        run: nix build --accept-flake-config -L '.#${{ matrix.attr }}'

  full-build:
    runs-on: [self-hosted, shared]
    if: always()
    name: full build
    needs:
      - nix-matrix
      - build
    steps:
      - name: Require all package builds
        run: |
          set -Eeu
          test '${{ needs.nix-matrix.result }}' = 'success'
          test '${{ needs.build.result }}' = 'success'
